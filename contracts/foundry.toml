[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "paris"
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
polkadot_hub_testnet = "https://eth-rpc-testnet.polkadot.io/"
polkadot_hub_mainnet = "https://eth-rpc.polkadot.io/"
